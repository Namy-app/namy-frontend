<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var dest = window.location.pathname + window.location.search + window.location.hash;
      if (dest && dest !== '/') {
        localStorage.setItem('spa_redirect', dest);
      }
      window.location.replace('/index.html');
    </script>
  </head>
  <body></body>
</html>
